      <head>
        <title>Form</title>
      </head>
      <h1> Add New Interest</h1>
      <form>
  <div class="form-group" style="width:30%">
    <label for="interest_name">interest name</label>
    <input type="text" class="form-control" id="interest_name">
  </div>
  <div class="form-group" style="width:30%">
    <label for="interest_text">Text about interest</label>
    <textarea class="form-control" id="interest_text" rows="4"></textarea>
  </div>

  <p>Upload local Image:</p>
  <input type="file" id="myFile" name="filename">
  <br>
  <label for="sel1">select # of tweets to display:</label>
     <select class="form-control" id="sel1" style = "width: 20%">
       <option>1</option>
       <option>2</option>
       <option>3</option>
       <option>4</option>
     </select>
     <br>
     <p>On a scale of 1-5 how interested are you?</p>
     <div class="form-check form-check-inline">
       <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
       <label class="form-check-label" for="inlineCheckbox1">1</label>
     </div>
     <div class="form-check form-check-inline">
       <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
       <label class="form-check-label" for="inlineCheckbox2">2</label>
     </div>
     <div class="form-check form-check-inline">
       <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="option3">
       <label class="form-check-label" for="inlineCheckbox3">3</label>
     </div>
     <div class="form-check form-check-inline">
       <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="option3">
       <label class="form-check-label" for="inlineCheckbox3">4</label>
     </div>
     <div class="form-check form-check-inline">
       <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="option3">
       <label class="form-check-label" for="inlineCheckbox3">5</label>
     </div>


     <div class="form-group" style= "width: 20%">
    <label for="username">log in to finish submission</label>
    <input type="username" class="form-control" id="username" aria-describedby="emailHelp" placeholder="Enter username">
    <label for="exampleInputPassword1">Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password">
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>
